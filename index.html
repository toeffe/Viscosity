<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viscosity</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#070710;--surf:#0e0e1e;--surf2:#12122a;
  --border:#252545;--border2:#353565;
  --text:#dde0ff;--muted:#7070a0;--dim:#3a3a6a;
  --accent:#00d4ff;--gold:#ffc800;--green:#00e676;--red:#ff4444;
  --panel-w:300px;
}
body{background:var(--bg);font-family:'Space Mono',monospace;color:var(--text);overflow:hidden;height:100vh;width:100vw;cursor:none;}
canvas{position:absolute;top:0;left:0;display:block;}

/* ── HUD ───────────────────────────────────────────────────── */
#hud{
  position:absolute;top:0;left:0;right:var(--panel-w);
  padding:10px 14px;display:flex;align-items:flex-start;gap:20px;
  pointer-events:none;z-index:20;
  background:linear-gradient(to bottom,#070710ee 60%,transparent);
}
.stat{display:flex;flex-direction:column;gap:1px;}
.stat-lbl{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:34px;line-height:1;color:var(--accent);}
.stat-val.gold{color:var(--gold);}
.stat-val.green{color:var(--green);}

/* ── COMBO ─────────────────────────────────────────────────── */
#combo-wrap{
  position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);
  pointer-events:none;z-index:30;text-align:center;opacity:0;
  transition:opacity .25s;
}
#combo-txt{
  font-family:'Bebas Neue',sans-serif;font-size:52px;color:var(--gold);
  text-shadow:0 2px 20px #ffc80066;line-height:1;
}
#combo-sub{font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;}

/* ── SHOP TOGGLE BUTTON (mobile only) ─────────────────────── */
#shop-toggle{
  display:none;
  position:absolute;bottom:16px;right:16px;z-index:40;
  background:var(--surf2);border:1px solid var(--border2);
  border-radius:50%;width:52px;height:52px;
  font-size:22px;cursor:pointer;color:var(--accent);
  align-items:center;justify-content:center;
  box-shadow:0 4px 20px #00000088;
  transition:background .15s,transform .1s;
}
#shop-toggle:active{transform:scale(.93);}

/* ── SHOP PANEL ────────────────────────────────────────────── */
#panel{
  position:absolute;top:0;right:0;bottom:0;width:var(--panel-w);
  background:var(--surf);border-left:1px solid var(--border);
  display:flex;flex-direction:column;z-index:20;
  transition:transform .35s cubic-bezier(.4,0,.2,1);
}
#panel-header{
  padding:12px 14px 0;border-bottom:1px solid var(--border);flex-shrink:0;
}
#panel-title{
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--accent);
}
#panel-sub{font-size:10px;color:var(--muted);margin:2px 0 10px;letter-spacing:1px;}

/* Tabs */
#tabs{display:flex;gap:0;border-bottom:1px solid var(--border);}
.tab{
  flex:1;height:52px;background:none;border:none;
  font-family:'Space Mono',monospace;
  color:var(--muted);cursor:pointer;
  border-bottom:2px solid transparent;
  transition:color .15s,border-color .15s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  padding:0;
}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-icon{font-size:16px;line-height:1;display:block;text-align:center;pointer-events:none;}
.tab-label{font-size:9px;letter-spacing:1px;text-transform:uppercase;display:block;text-align:center;white-space:nowrap;pointer-events:none;}

#panel-body{flex:1;overflow-y:auto;padding:10px;}
#panel-body::-webkit-scrollbar{width:4px;}
#panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ── MOBILE ─────────────────────────────────────────────────── */
@media(max-width:600px){
  :root{--panel-w:0px;}

  body{cursor:auto;}

  /* HUD stretches full width on mobile */
  #hud{right:0;padding:8px 10px;gap:12px;}
  .stat-val{font-size:24px;}
  .stat-lbl{font-size:9px;}

  /* Hide save indicator on mobile */
  #save-ind{display:none;}

  /* Show toggle button */
  #shop-toggle{display:flex;}

  /* Panel becomes a bottom drawer */
  #panel{
    top:auto;right:0;left:0;bottom:0;width:100%;
    height:72vh;
    border-left:none;border-top:1px solid var(--border2);
    border-radius:16px 16px 0 0;
    transform:translateY(100%);
  }
  #panel.open{transform:translateY(0);}

  /* Drag handle on top of panel */
  #panel-header::before{
    content:'';display:block;
    width:40px;height:4px;border-radius:2px;
    background:var(--border2);margin:0 auto 10px;
  }

  /* Combo text smaller on mobile */
  #combo-txt{font-size:36px;}
}

/* Landscape mobile — side panel but narrower */
@media(max-height:500px) and (max-width:900px){
  :root{--panel-w:220px;}
  #hud{gap:14px;}
  .stat-val{font-size:26px;}
  #panel{width:220px;}
}

.sec-lbl{
  font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;
  margin:10px 0 5px;padding-bottom:5px;border-bottom:1px solid var(--border);
}
.sec-lbl:first-child{margin-top:2px;}

/* Upgrade buttons */
.upg{
  background:var(--surf2);border:1px solid var(--border);border-radius:8px;
  padding:9px 11px;cursor:pointer;text-align:left;width:100%;
  font-family:'Space Mono',monospace;color:var(--text);margin-bottom:5px;
  transition:border-color .15s,background .15s,transform .08s;
}
.upg:hover:not([disabled]){background:#18182e;border-color:var(--border2);transform:translateY(-1px);}
.upg:active:not([disabled]){transform:translateY(0);}
.upg[disabled]{opacity:.28;cursor:not-allowed;}
.upg.can{border-color:#ffc80055;background:#161404;}
.upg.can:hover{border-color:#ffc800aa;background:#1e1c06;}
.upg.maxed{border-color:#00d4ff33;opacity:.45;cursor:not-allowed;}
.upg-top{display:flex;justify-content:space-between;align-items:baseline;}
.upg-name{font-size:12px;font-weight:700;color:#eeeeff;}
.upg-lvl{font-size:10px;color:var(--muted);}
.upg-desc{font-size:11px;color:#9090c0;margin-top:3px;}
.upg-bar{height:3px;background:#1e1e3a;border-radius:2px;margin:6px 0 4px;overflow:hidden;}
.upg-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s;}
.upg-cost{font-size:12px;color:var(--gold);font-weight:700;}

/* Liquid / Hose tiles */
.tile{
  background:var(--surf2);border:1px solid var(--border);border-radius:8px;
  padding:9px 11px;cursor:pointer;width:100%;text-align:left;
  font-family:'Space Mono',monospace;font-size:11px;color:var(--text);
  margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;
  transition:all .15s;
}
.tile:hover{border-color:var(--border2);background:#18182e;}
.tile.active{border-color:var(--accent);background:#001c22;color:var(--accent);}
.tile.locked{opacity:.32;}
.tile-left{display:flex;align-items:center;gap:9px;}
.tile-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.tile-name{font-size:11px;font-weight:700;}
.tile-right{text-align:right;font-size:10px;color:var(--muted);line-height:1.5;}
.tile-right .sub{font-size:10px;color:var(--gold);}

/* Achievements */
.ach{
  padding:8px 10px;border-radius:7px;border:1px solid var(--border);
  background:var(--surf2);margin-bottom:5px;
}
.ach.got{border-color:#ffc80044;background:#191700;}
.ach-name{font-size:11px;font-weight:700;color:#888;}
.ach.got .ach-name{color:var(--gold);}
.ach-desc{font-size:10px;color:var(--dim);margin-top:2px;}
.ach-prog{font-size:9px;color:var(--muted);margin-top:3px;}
.ach-count{font-size:10px;color:var(--muted);margin-bottom:6px;}

/* ── FLOATERS ──────────────────────────────────────────────── */
#floaters{position:absolute;inset:0;pointer-events:none;z-index:25;overflow:hidden;}
.floater{
  position:absolute;font-family:'Bebas Neue',sans-serif;font-size:19px;
  pointer-events:none;transform:translateX(-50%);
  text-shadow:0 1px 6px #00000099;
  animation:fup 1s ease-out forwards;
}
@keyframes fup{
  0%{opacity:1;transform:translateX(-50%) translateY(0);}
  100%{opacity:0;transform:translateX(-50%) translateY(-55px);}
}

/* ── TOAST ─────────────────────────────────────────────────── */
#toast-area{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:200;pointer-events:none;}
.toast{
  background:var(--surf2);border:1px solid #ffc80066;border-radius:10px;
  padding:11px 20px;text-align:center;margin-top:8px;
  box-shadow:0 4px 28px #00000099;
  animation:tslide .4s cubic-bezier(.175,.885,.32,1.275) forwards;
}
@keyframes tslide{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
.toast-tag{font-size:10px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;}
.toast-name{font-size:14px;font-weight:700;color:#fff;margin-top:3px;}
.toast-desc{font-size:10px;color:var(--muted);margin-top:2px;}

/* ── CURSOR ────────────────────────────────────────────────── */
#cur{
  position:fixed;width:11px;height:11px;border:2px solid var(--accent);
  border-radius:50%;pointer-events:none;z-index:100;
  transform:translate(-50%,-50%);mix-blend-mode:screen;
}

/* ── SAVE INDICATOR ────────────────────────────────────────── */
#save-ind{
  position:absolute;bottom:10px;left:10px;font-size:9px;
  color:var(--dim);letter-spacing:1px;pointer-events:none;z-index:30;
  transition:opacity .5s;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="stat"><div class="stat-lbl">Score</div><div class="stat-val" id="h-score">0</div></div>

</div>

<script>
// ════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const rnd = (a,b) => Math.random()*(b-a)+a;
const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v));
const lerp = (a,b,t) => a+(b-a)*t;
const dst = (ax,ay,bx,by) => Math.sqrt((ax-bx)**2+(ay-by)**2);

// Infinite number formatting — handles up to e300+
const SUFFIXES = [
  '','K','M','B','T','Qa','Qi','Sx','Sp','Oc','No','Dc',
  'UDc','DDc','TDc','QaDc','QiDc','SxDc','SpDc','OcDc','NoDc','Vg',
  'UVg','DVg','TVg','QaVg','QiVg','SxVg','SpVg','OcVg','NoVg','Tg',
];
function fmt(n) {
  if (isNaN(n)||!isFinite(n)) return '∞';
  if (n < 1000) return Math.floor(n).toString();
  const e = Math.floor(Math.log10(Math.abs(n)));
  const tier = Math.floor(e/3);
  if (tier < SUFFIXES.length) {
    const scaled = n / Math.pow(10, tier*3);
    return scaled.toFixed(tier > 6 ? 0 : 2) + SUFFIXES[tier];
  }
  return n.toExponential(2);
}

// ════════════════════════════════════════════════════════
// DATA — LIQUIDS

// ════════════════════════════════════════════════════════
// DATA — HOSES

  {id:'godpipe',    name:'God Pipe',          icon:'✨', desc:'Transcends physics itself',   cost:5e9,      flow:25.0,dmult:200.0,col:'#e3f2fd',hi:'#ffffff',revealAt:2e9    },

// ════════════════════════════════════════════════════════
// DATA — UPGRADES
// tier: 1=always, 2=mid, 3=late, 4=endgame, 5=beyond
// ════════════════════════════════════════════════════════
function mkCosts(base, factor, n) {
  const c = [];
  let v = base;
  for (let i=0;i<n;i++){c.push(Math.round(v));v*=factor;}
  return c;
}

// Upgrade cost at any level — uses stored costs array up to its length,
// then extrapolates exponentially beyond that forever
function upgCost(def, lvl){
  if(lvl < def.costs.length) return def.costs[lvl];
  // Beyond the table: last cost * factor^(lvl - lastIndex)
  const last = def.costs[def.costs.length-1];
  const factor = def.costs.length > 1
    ? def.costs[def.costs.length-1] / def.costs[def.costs.length-2]
    : 3;
  return last * Math.pow(factor, lvl - (def.costs.length-1));
}

// Soft cap display — show level but no hard max
function upgMaxed(def, lvl){ return false; } // nothing is ever truly maxed

const UPGRADES = [
  // Tier 1
  {id:'flow',      name:'Flow Rate',       desc:'Lower drop cost → more drops from wiggle', icon:'⚡',tier:1,revealAt:0,

  {id:'puddle',    name:'Puddle Magnet',   desc:'Drops pulled toward puddle',     icon:'🧲',tier:2,revealAt:3000,

const canvas=$('c'), ctx=canvas.getContext('2d');
// Safe visible height — uses visualViewport on mobile to avoid browser chrome overlap
function visH(){ return (window.visualViewport ? window.visualViewport.height : window.innerHeight); }
function groundY(){ return visH() - 80; }
const PANEL_W=()=>window.innerWidth<=600?0:window.innerWidth<=900&&window.innerHeight<=500?220:300;

function toggleShop(){
  const p=$('panel');
  const open=p.classList.toggle('open');
  $('shop-toggle').textContent=open?'✕':'🛒';
}

// Swipe down on panel to close it (mobile)
(()=>{
  let startY=0;
  $('panel').addEventListener('touchstart',e=>{startY=e.touches[0].clientY;},{passive:true});
  $('panel').addEventListener('touchend',e=>{
    if(e.changedTouches[0].clientY-startY>60){
      $('panel').classList.remove('open');
      $('shop-toggle').textContent='🛒';
    }
  },{passive:true});
})();
function resize(){
  const pw=PANEL_W();
  const vh=visH();
  canvas.width=window.innerWidth-pw;
  canvas.height=vh;
  canvas.style.width=(window.innerWidth-pw)+'px';
  canvas.style.height=vh+'px';
  S.hoseBaseX=canvas.width/2;
  S.puddle.x=canvas.width/2;
  S.puddle.y=groundY();
  if(typeof FX!=='undefined'){
    for(const p of FX.bgParticles){
      p.x=rnd(0,canvas.width);p.y=rnd(0,canvas.height);
    }
  }
}
canvas.width=window.innerWidth-PANEL_W();
canvas.height=visH();
canvas.style.width=(window.innerWidth-PANEL_W())+'px';
canvas.style.height=visH()+'px';
window.addEventListener('resize',resize);
if(window.visualViewport) window.visualViewport.addEventListener('resize',resize);

// SAVE / LOAD
// ════════════════════════════════════════════════════════
const SAVE_KEY='viscosity_v1';
function saveGame(){
  const d={
    score:S.score,driplets:S.driplets,lifeDrip:S.lifeDrip,
    totalSpent:S.totalSpent,puddleLevel:S.puddleLevel,
    puddlesDone:S.puddlesDone,maxCombo:S.maxCombo,
    puddleRadius:S.puddle.radius,puddleMaxRadius:S.puddle.maxRadius,
    currentLiquid:S.currentLiquid,currentHose:S.currentHose,
    prestigeCount:S.prestigeCount||0,
    upgrades:S.upgrades,liquids:S.liquids,hoses:S.hoses,
    achievements:S.achievements,
  };
  try{localStorage.setItem(SAVE_KEY,JSON.stringify(d));}catch(e){}
  const ind=$('save-ind');
  ind.style.color='#00e676';ind.textContent='⬡ saved';
  setTimeout(()=>{ind.style.color='';ind.textContent='⬡ auto-save';},1500);
}
function loadGame(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return;
    const d=JSON.parse(raw);
    S.score=d.score||0;S.driplets=d.driplets||0;
    S.lifeDrip=d.lifeDrip||0;S.totalSpent=d.totalSpent||0;
    S.puddleLevel=d.puddleLevel||1;S.puddlesDone=d.puddlesDone||0;
    S.maxCombo=d.maxCombo||0;
    S.puddle.radius=d.puddleRadius||25;
    S.puddle.maxRadius=d.puddleMaxRadius||200;
    S.currentLiquid=d.currentLiquid||'water';
    S.currentHose=d.currentHose||'garden';
    S.prestigeCount=d.prestigeCount||0;
    S.prestigedThisRun=false;
    if(d.upgrades)Object.assign(S.upgrades,d.upgrades);
    if(d.liquids)Object.assign(S.liquids,d.liquids);
    if(d.hoses)Object.assign(S.hoses,d.hoses);
    if(d.achievements)Object.assign(S.achievements,d.achievements);
  }catch(e){console.warn('Load failed',e);}
}

// GAME HELPERS
// ════════════════════════════════════════════════════════
function liq(){return LIQUIDS[S.currentLiquid]||LIQUIDS.water;}
function hose(){return HOSES.find(h=>h.id===S.currentHose)||HOSES[0];}
function upg(id){return S.upgrades[id]||0;}

function genesisBonus(){return Math.pow(1.05,upg('genesis'));}
function flowInterval(){
  const base=1600,red=upg('flow')*105,pres=upg('pressure')*.05,tw=upg('timewarp')*.15;
  return Math.max(60,(base-red)/(hose().flow*(1+pres+tw)));
}
function dropRadius(){
  // Hard cap so drops don't dominate screen — max 22px visual radius
  const raw=(4+upg('size')*1.2)*liq().sz*Math.sqrt(hose().dmult)*(1+upg('gravity')*.10)*genesisBonus();
  return clamp(raw,3,22);
}
function prestigeBonus(){return Math.pow(1.5,S.prestigeCount||0);}
function dropValue(){
  const h=hose(),l=liq();
  const vm=1+upg('value')*.38,szm=1+upg('size')*.12,spm=1+upg('splash')*.10;
  const hm=1+(h.dmult-1)*.45,pm=Math.pow(1.12,upg('prestige'));
  const gm=genesisBonus();
  const singMod=Math.pow(2,upg('singularity')||0);
  const omnMod=Math.pow(1.5,upg('omnipotence')||0);
  return vm*szm*spm*hm*pm*gm*singMod*omnMod*l.mult*prestigeBonus();
}
function wiggle(){return 1+upg('wiggle')*.45;}
function autoInterval(){
  if(!upg('auto'))return Infinity;
  const tw=1+upg('timewarp')*.22;
  return Math.max(60,5500/(upg('auto')*tw));
}
function comboWindow(){return 50+upg('combo')*28;}
function comboMult(){
  if(S.combo<2)return 1;
  const cap=upg('singmind')>0?99999:5;
  return 1+Math.min(S.combo*.055,cap)*(1+upg('combo')*.08);
}
function drainBonus(){
  const darkFlow=Math.pow(100,upg('darkflow')||0);
  return (1+upg('drain')*.32)*Math.pow(10,upg('godhood')*.6)*genesisBonus()*darkFlow*prestigeBonus();
}
function magnetForce(){return(upg('puddle')*.05+upg('conductor')*.08)*genesisBonus();}
function fillAmt(r,spread){
  const tc=1+upg('transcend')*.14;
  const pen=Math.pow(1.28,S.puddleLevel-1)/tc;
  return(r*r*.0032*spread)/pen;
}
function multiChance(){return Math.min(upg('multidrip')*.07,.85);}
function visible(revealAt){return(S.totalSpent||0)>=revealAt;}

// ════════════════════════════════════════════════════════
// PARTICLES & FLOATERS — all canvas-rendered, hard capped
// ════════════════════════════════════════════════════════
const MAX_PARTICLES = 120;
const MAX_SPLASHES  = 20;
const MAX_RINGS     = 15;
const MAX_FLOATERS  = 20;

// Canvas-rendered floaters — no DOM elements
S.floaters = [];

function splash(x,y,liqObj,n){
  // Cap incoming particles
  const space = MAX_PARTICLES - S.particles.length;
  const count = Math.min(n, space, 6);
  for(let i=0;i<count;i++){
    const a=rnd(0,Math.PI*2),spd=rnd(1.5,4);
    S.particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-rnd(1.5,3.5),
      r:rnd(1.5,3),life:1,decay:rnd(.04,.08),col:liqObj.color});
  }
  if(S.splashes.length < MAX_SPLASHES)
    S.splashes.push({x,y,r:4,maxR:30,life:1,col:liqObj.color});
}

// Throttle: only show a floater every N ms per position to avoid flood
let _lastFloatTime = 0;
function floatTxt(x,y,txt,col){
  const now = Date.now();
  // Allow drain text always; throttle drop earn text to max ~12/sec
  const isDrain = txt.includes('DRAINED');
  if(!isDrain && now - _lastFloatTime < 80) return;
  _lastFloatTime = now;
  if(S.floaters.length >= MAX_FLOATERS) S.floaters.shift();
  S.floaters.push({x, y, txt, col, life:1, vy:-1.2});
}

// ════════════════════════════════════════════════════════
// DROP PHYSICS
// ════════════════════════════════════════════════════════
function creditDrop(){
  // Counts as a puddle hit for income/fill — no visual drop spawned
  const l=liq();
  const val=dropValue();
  const cm=comboMult();
  const earned=Math.max(1,Math.round(val*cm));
  S.score+=earned*10;
  S.driplets+=earned;
  S.lifeDrip+=earned;
  const grow=fillAmt(dropRadius(),l.spread)*1.3;
  S.puddle.radius=Math.min(S.puddle.maxRadius,S.puddle.radius+grow);
  if(S.puddle.radius>=S.puddle.maxRadius&&!S.plug)
    S.plug={x:S.puddle.x,y:S.puddle.y-32,bob:0,draining:false,prog:0};
  S.combo++;
  S.comboTimer=comboWindow();
  if(S.combo>S.maxCombo)S.maxCombo=S.combo;
  updateHUD();
}

function spawnDrop(fromAuto=false){
  const l=liq(),w=wiggle();
  const vx=S.hoseBendVel*.35+rnd(-1.5,1.5)*l.spread*w;
  const vy=Math.max(.4,rnd(.8,2.2)-upg('gravity')*.07);
  const r=dropRadius();
  S.drops.push({x:S.nozzleX,y:S.nozzleY,vx,vy,r,liqId:S.currentLiquid,trail:[],bounces:0,fromAuto});
  if(Math.random()<multiChance()){
    S.drops.push({x:S.nozzleX+rnd(-10,10),y:S.nozzleY,
      vx:vx+rnd(-2,2),vy,r:r*.75,liqId:S.currentLiquid,trail:[],bounces:0,fromAuto});
  }
  if(!fromAuto)S._puddleTouchedByMouse=true;
}

function dropLanded(d){
  const l=LIQUIDS[d.liqId]||LIQUIDS.water;
  const val=dropValue();
  const cm=comboMult();
  // No arbitrary cap — number formatting handles big numbers
  const earned=Math.max(1,Math.round(val*cm));

  S.score+=earned*10;
  S.driplets+=earned;
  S.lifeDrip+=earned;
  S.shake=Math.min(S.shake+1.2,5);

  const onPuddle=dst(d.x,d.y,S.puddle.x,S.puddle.y)<S.puddle.radius*1.5;
  const grow=fillAmt(d.r,l.spread)*(onPuddle?1.3:.42);
  S.puddle.radius=Math.min(S.puddle.maxRadius,S.puddle.radius+grow);

  // Combo only builds on puddle hits — misses reset it
  if(onPuddle){
    S.combo++;
    S.comboTimer=comboWindow();
    if(S.combo>S.maxCombo)S.maxCombo=S.combo;
    triggerHitFX(d.x, d.y, l.color, S.combo);
  } else {
    S._totalMisses++;
    if(S.combo>=100)  S._brokeCombo100++;
    if(S.combo>=500)  S._brokeCombo500++;
    if(S.combo>=10000)S._brokeCombo10k++;
    S.combo=0;
    S.comboTimer=0;
    $('combo-wrap').style.opacity='0';
  }

  // Overflow bonus
  if(S.puddle.radius>=S.puddle.maxRadius&&upg('overflow')>0){
    const bonus=Math.round(earned*upg('overflow')*.4);
    S.driplets+=bonus;S.lifeDrip+=bonus;
    if(bonus>0)floatTxt(d.x,d.y-30,`overflow +${fmt(bonus)}`,'#ff6600');
  }

  if(S.puddle.radius>=S.puddle.maxRadius&&!S.plug){
    S.plug={x:S.puddle.x,y:S.puddle.y-32,bob:0,draining:false,prog:0};
  }

  for(let i=0;i<S.puddle.noise.length;i++){
    S.puddle.noiseT[i]+=rnd(-5,5);
    S.puddle.noiseT[i]=clamp(S.puddle.noiseT[i],-18,18);
  }
  splash(d.x,d.y,l,onPuddle?10:5);
  floatTxt(d.x,d.y-18,`+${fmt(earned)}`,l.color);
  updateHUD();
}

// ════════════════════════════════════════════════════════
// UPDATE
// ════════════════════════════════════════════════════════
let lastTs=0;
function update(ts){
  const dt=Math.min(ts-lastTs,50);lastTs=ts;

  // Hose spring
  const maxB=canvas.width*.36*wiggle();
  const target=S.mouseHeld?((S.mouseX/canvas.width)-.5)*2*maxB:0;
  const k=S.mouseHeld?.22:.04,damp=.74;
  const prevBend=S.hoseBend;
  S.hoseBendVel=(S.hoseBendVel+(target-S.hoseBend)*k)*damp;
  S.hoseBend+=S.hoseBendVel;
  S.nozzleX=S.hoseBaseX+S.hoseBend;
  S.nozzleY=S.hoseBaseY+S.hoseLen;
  S.shake*=.88;

  // ── Drop spawning: wiggle = more drops ──────────────────
  // How fast the nozzle tip is moving this frame
  const nozzleSpeed=Math.abs(S.hoseBendVel);

  if(S.mouseHeld){
    // Wiggle pressure: fast movement fills the bucket quickly.
    // Wiggle Amp upgrade multiplies the contribution.
    // Base trickle even when still so holding always does something.
    const wiggleContrib = nozzleSpeed * (0.08 + upg('wiggle') * 0.04);
    const baseTrickle   = 0.002;
    S.dropPressure = (S.dropPressure||0) + (baseTrickle + wiggleContrib) * dt;

    const dropCost = Math.max(40, 800 - upg('flow') * 50);

    while(S.dropPressure >= dropCost){
      S.dropPressure -= dropCost;
      if(S.drops.length < 60){
        spawnDrop();
      } else {
        // Visual cap reached — credit earnings directly without physics
        creditDrop();
      }
    }
  } else {
    // Bleed pressure when not held so it doesn't instantly burst on re-click
    S.dropPressure = Math.max(0, (S.dropPressure||0) - dt * 0.05);
  }

  // Auto-drip
  if(upg('auto')>0){
    S.autoTimer+=dt;
    if(S.autoTimer>=autoInterval()){S.autoTimer=0;spawnDrop();}
  }

  // Combo decay
  if(S.comboTimer>0){
    S.comboTimer-=dt;
    if(S.comboTimer<=0){S.combo=0;$('combo-wrap').style.opacity='0';}
  }

  // Puddle noise
  for(let i=0;i<S.puddle.noise.length;i++){
    S.puddle.noise[i]=lerp(S.puddle.noise[i],S.puddle.noiseT[i],.04);
    S.puddle.noiseT[i]+=rnd(-.4,.4);
    S.puddle.noiseT[i]*=.97;
  }

  // Plug drain
  if(S.plug){
    S.plug.bob=Math.sin(Date.now()*.003)*5;
    if(S.plug.draining){
      S.plug.prog+=dt*.0009;
      S.puddle.radius=S.puddle.maxRadius*(1-S.plug.prog);
      if(S.plug.prog>=1){
        S.puddlesDone++;
        const base=Math.round(250*Math.pow(1.55,S.puddleLevel-1));
        const reward=Math.round(base*drainBonus());
        S.driplets+=reward;S.lifeDrip+=reward;S.totalSpent; // track
        floatTxt(S.puddle.x,S.puddle.y-70,`+${fmt(reward)} 💧 DRAINED!`,'#ffc800');
        triggerDrainFX();
        S.shake=12;
        S.puddleLevel++;
        S.puddle.maxRadius=clamp(200+S.puddleLevel*6,200,350);
        S.puddle.radius=25;S.plug=null;
        updateHUD();buildShop();checkMilestones();
      }
    }
  }

  // Drop physics
  const gnd=groundY();
  const mag=magnetForce();
  for(let i=S.drops.length-1;i>=0;i--){
    const d=S.drops[i];
    d.trail.push({x:d.x,y:d.y});
    if(d.trail.length>8)d.trail.shift();
    const dl=LIQUIDS[d.liqId]||LIQUIDS.water;
    d.vy+=dl.gravity*(1+upg('pressure')*.07);
    d.vx*=.995;
    if(mag>0){
      const dx2=S.puddle.x-d.x,dy2=S.puddle.y-d.y,dd=Math.sqrt(dx2*dx2+dy2*dy2);
      if(dd>1){d.vx+=(dx2/dd)*mag;d.vy+=(dy2/dd)*mag*.25;}
    }
    d.x+=d.vx;d.y+=d.vy;
    if(d.x<d.r){d.x=d.r;d.vx=Math.abs(d.vx)*.4;}
    if(d.x>canvas.width-d.r){d.x=canvas.width-d.r;d.vx=-Math.abs(d.vx)*.4;}
    if(d.y>=gnd-d.r){
      if(dl.bounce>0&&d.bounces<3&&Math.abs(d.vy)>2.5){
        d.y=gnd-d.r;d.vy=-d.vy*dl.bounce;d.vx+=rnd(-1,1);d.bounces++;
        splash(d.x,d.y,dl,3);
      }else{dropLanded(d);S.drops.splice(i,1);}
    }
  }

  // Particles
  for(let i=S.particles.length-1;i>=0;i--){
    const p=S.particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=.2;p.life-=p.decay;
    if(p.life<=0)S.particles.splice(i,1);
  }
  for(let i=S.splashes.length-1;i>=0;i--){
    const sp=S.splashes[i];
    sp.r+=(sp.maxR-sp.r)*.12;sp.life-=.055;
    if(sp.life<=0)S.splashes.splice(i,1);
  }
  // Canvas floaters
  for(let i=S.floaters.length-1;i>=0;i--){
    const f=S.floaters[i];
    f.y+=f.vy;f.life-=.025;
    if(f.life<=0)S.floaters.splice(i,1);
  }

  // Periodic tasks
  S._shopTimer+=dt;if(S._shopTimer>4000){S._shopTimer=0;buildShop();}
  S._saveTimer+=dt;if(S._saveTimer>30000){S._saveTimer=0;saveGame();}
  S._milTimer+=dt;if(S._milTimer>2000){S._milTimer=0;checkMilestones();}

  updateFX(dt);

  // Combo display
  if(S.combo>=3){
    $('combo-wrap').style.opacity='1';
    $('combo-txt').textContent=`FLOW ×${S.combo}`;
    $('combo-txt').style.fontSize=Math.min(30+S.combo*.8,72)+'px';
  }
}

// ════════════════════════════════════════════════════════
// DRAW
// ════════════════════════════════════════════════════════

// Ambient state — smoothly interpolated
const FX = {
  intensity: 0,   // 0–1, driven by drop rate + combo
  bgHue: 220,     // current background hue
  bgHueTarget: 220,
  flash: 0,       // drain flash brightness
  pulseRings: [], // shockwave rings [{x,y,r,maxR,life,col}]
  bgParticles: [], // floating ambient specks
};

// Seed bg particles
for(let i=0;i<40;i++) FX.bgParticles.push({
  x:rnd(0,800),y:rnd(0,600),vy:rnd(-.3,-.08),vx:rnd(-.1,.1),
  r:rnd(.8,2.5),life:rnd(0,1),col:'#ffffff'
});

function updateFX(dt){
  // Intensity driven by drop pressure + combo
  const dropActivity = Math.min((S.dropPressure||0)/200, 1);
  const comboActivity = Math.min(S.combo/50, 1);
  const targetIntensity = Math.max(dropActivity, comboActivity * .8);
  FX.intensity = lerp(FX.intensity, targetIntensity, .04);

  // Background hue follows current liquid color
  const l = liq();
  const hueMap = {
    water:220, oil:35, neon:145, lava:15, slime:80,
    mercury:200, quantum:290, void:260, starplasm:55,
    chronofluid:175, godwater:210, abyss:275, cosmicmilk:230, infinidrop:45
  };
  FX.bgHueTarget = hueMap[S.currentLiquid] || 220;
  FX.bgHue = lerp(FX.bgHue, FX.bgHueTarget, .015);

  // Flash decay
  FX.flash = Math.max(0, FX.flash - dt * .004);

  // Pulse rings
  for(let i=FX.pulseRings.length-1;i>=0;i--){
    const r=FX.pulseRings[i];
    r.r += (r.maxR - r.r) * .1;
    r.life -= .035;
    if(r.life<=0) FX.pulseRings.splice(i,1);
  }

  // Ambient bg particles — drift upward, wrap
  for(const p of FX.bgParticles){
    p.x += p.vx + Math.sin(Date.now()*.0005+p.y*.01)*.15;
    p.y += p.vy * (1 + FX.intensity * 2);
    p.life = Math.min(1, p.life + .003);
    if(p.y < -5){ p.y = canvas.height + 5; p.x = rnd(0, canvas.width); p.life = 0; }
    p.col = l.color;
  }
}

function triggerDrainFX(){
  FX.flash = 1;
  // Big shockwave from puddle center
  for(let i=0;i<3;i++){
    FX.pulseRings.push({
      x:S.puddle.x, y:S.puddle.y,
      r:S.puddle.maxRadius*.3,
      maxR:canvas.width*.8,
      life:1, col:liq().color
    });
  }
}

function triggerHitFX(x, y, col, combo){
  if(FX.pulseRings.length < MAX_RINGS)
    FX.pulseRings.push({x, y, r:4, maxR:clamp(20+combo*.4, 20, 70), life:1, col});
  // Only burst particles at meaningful combo milestones, capped hard
  if(combo>0 && combo%10===0){
    const n = Math.min(8, MAX_PARTICLES - S.particles.length);
    for(let i=0;i<n;i++){
      const a=rnd(0,Math.PI*2), spd=rnd(2,5);
      S.particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-rnd(1,3),
        r:rnd(2,4),life:1,decay:rnd(.03,.06),col});
    }
  }
}

function drawFloaters(){
  ctx.save();
  ctx.textAlign='center';
  ctx.font='bold 15px "Bebas Neue",sans-serif';
  for(const f of S.floaters){
    ctx.globalAlpha = f.life;
    ctx.fillStyle = f.col;
    ctx.shadowColor = f.col;
    ctx.shadowBlur = 6;
    ctx.fillText(f.txt, f.x, f.y);
  }
  ctx.shadowBlur=0;
  ctx.globalAlpha=1;
  ctx.restore();
}

function draw(){
  ctx.save();
  if(S.shake>.3){ctx.translate(rnd(-S.shake,S.shake),rnd(-S.shake*.4,S.shake*.4));}

  drawBackground();
  drawGrid();
  drawPulseRings();
  drawGround();
  drawPuddle();
  drawSplashes();
  drawParticles();
  drawDrops();
  drawHose();
  drawPlug();
  drawFloaters();
  drawVignette();
  drawFlash();

  ctx.restore();
}

function hexRgb(hex){
  const h=hex.replace('#','');
  return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];
}
function rgba(hex,a){const [r,g,b]=hexRgb(hex);return `rgba(${r},${g},${b},${a})`;}

function drawBackground(){
  const intensity=FX.intensity;
  const l=liq();

  // Base dark bg — hue shifts with liquid
  const sat=Math.round(15+intensity*25);
  const lig=Math.round(4+intensity*6);
  ctx.fillStyle=`hsl(${Math.round(FX.bgHue)},${sat}%,${lig}%)`;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Radial glow from bottom — brightens with intensity
  const gSize=canvas.height*(.6+intensity*.5);
  const bg=ctx.createRadialGradient(canvas.width/2,canvas.height,0,canvas.width/2,canvas.height,gSize);
  bg.addColorStop(0,rgba(l.color,.08+intensity*.22));
  bg.addColorStop(1,'transparent');
  ctx.fillStyle=bg;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Ambient drifting particles
  ctx.save();
  for(const p of FX.bgParticles){
    ctx.globalAlpha=p.life*(.04+intensity*.08);
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=l.color;
    ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.restore();
}

function drawPulseRings(){
  for(const r of FX.pulseRings){
    ctx.beginPath();
    ctx.ellipse(r.x,r.y,r.r,r.r*.3,0,0,Math.PI*2);
    ctx.strokeStyle=rgba(r.col,r.life*.6);
    ctx.lineWidth=2*r.life;
    ctx.stroke();
  }
}

function drawVignette(){
  // Dark vignette that pulses inward on high intensity
  const spread = .45 + FX.intensity * .15;
  const vg=ctx.createRadialGradient(
    canvas.width/2,canvas.height/2,canvas.width*spread,
    canvas.width/2,canvas.height/2,canvas.width*.85
  );
  vg.addColorStop(0,'transparent');
  vg.addColorStop(1,`rgba(0,0,8,${.7+FX.intensity*.3})`);
  ctx.fillStyle=vg;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawFlash(){
  if(FX.flash<=0)return;
  ctx.fillStyle=rgba(liq().color, FX.flash*.35);
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawGrid(){
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.018)';
  ctx.lineWidth=.5;
  const s=56;
  for(let x=0;x<canvas.width;x+=s){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();}
  for(let y=0;y<canvas.height;y+=s){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();}
  ctx.restore();
}

function drawGround(){
  const gy=groundY();
  ctx.fillStyle='#0b0b1a';
  ctx.fillRect(0,gy,canvas.width,canvas.height-gy);
  ctx.strokeStyle='#252545';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(canvas.width,gy);ctx.stroke();
  // Glow under puddle
  const l=liq();
  const g=ctx.createRadialGradient(S.puddle.x,gy,0,S.puddle.x,gy,S.puddle.radius*1.4);
  g.addColorStop(0,l.pLight);g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.fillRect(0,gy-5,canvas.width,10);
}

function drawPuddle(){
  const p=S.puddle,segs=p.noise.length,l=liq();
  ctx.save();ctx.translate(p.x,p.y);

  // Outer glow
  const gg=ctx.createRadialGradient(0,0,0,0,0,p.radius*1.5);
  gg.addColorStop(0,l.pLight);gg.addColorStop(1,'transparent');
  ctx.fillStyle=gg;
  ctx.beginPath();ctx.ellipse(0,0,p.radius*1.6,p.radius*.5,0,0,Math.PI*2);ctx.fill();

  // Body
  ctx.beginPath();
  for(let i=0;i<=segs;i++){
    const a=(i/segs)*Math.PI*2-Math.PI/2;
    const r=p.radius+p.noise[i%segs];
    const px=Math.cos(a)*r,py=Math.sin(a)*r*.3;
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.closePath();
  const fg=ctx.createRadialGradient(0,-p.radius*.05,0,0,0,p.radius);
  fg.addColorStop(0,l.puddle+'ee');fg.addColorStop(.7,l.puddle+'99');fg.addColorStop(1,l.puddle+'33');
  ctx.fillStyle=fg;ctx.fill();
  // Highlight
  ctx.beginPath();ctx.ellipse(-p.radius*.12,-p.radius*.04,p.radius*.28,p.radius*.07,-.15,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.09)';ctx.fill();
  ctx.strokeStyle=l.color+'55';ctx.lineWidth=1.5;ctx.stroke();
  ctx.restore();
}

function drawSplashes(){
  for(const s of S.splashes){
    ctx.beginPath();ctx.ellipse(s.x,s.y,s.r,s.r*.28,0,0,Math.PI*2);
    ctx.strokeStyle=s.col+Math.round(s.life*0x77).toString(16).padStart(2,'0');
    ctx.lineWidth=1;ctx.stroke();
  }
}
function drawParticles(){
  for(const p of S.particles){
    ctx.globalAlpha=p.life;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    ctx.fillStyle=p.col;ctx.fill();
  }
  ctx.globalAlpha=1;
}
function drawDrops(){
  for(const d of S.drops){
    const l=LIQUIDS[d.liqId]||LIQUIDS.water;
    // Trail
    for(let t=0;t<d.trail.length;t++){
      const tr=d.trail[t],a=t/d.trail.length;
      ctx.globalAlpha=a*.25;
      ctx.beginPath();ctx.arc(tr.x,tr.y,d.r*a*.6,0,Math.PI*2);
      ctx.fillStyle=l.color;ctx.fill();
    }
    ctx.globalAlpha=1;
    // Drop — teardrop
    ctx.save();ctx.translate(d.x,d.y);
    const spd=Math.sqrt(d.vx**2+d.vy**2);
    ctx.rotate(Math.atan2(d.vy,d.vx)-Math.PI/2);
    const str=clamp(1+spd*.04,.8,1.6);
    ctx.scale(1/str,str);
    ctx.beginPath();ctx.arc(0,0,d.r,0,Math.PI*2);
    ctx.fillStyle=l.color;ctx.fill();
    ctx.beginPath();ctx.arc(-d.r*.22,-d.r*.22,d.r*.28,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.28)';ctx.fill();
    ctx.restore();
  }
}

function drawHose(){
  const bx=S.hoseBaseX,by=S.hoseBaseY,nx=S.nozzleX,ny=S.nozzleY;
  const h=hose(),l=liq();
  const cx=bx+(nx-bx)*.45,cy=by+(ny-by)*.55;
  ctx.save();ctx.lineCap='round';

  // Tube layers
  [[22,'#0d0d1e'],[15,h.col],[8,h.hi]].forEach(([lw,col])=>{
    ctx.lineWidth=lw;ctx.strokeStyle=col;
    ctx.beginPath();ctx.moveTo(bx,by);ctx.quadraticCurveTo(cx,cy,nx,ny);ctx.stroke();
  });
  // Stripe
  ctx.lineWidth=2;ctx.strokeStyle=h.hi+'55';ctx.setLineDash([8,14]);
  ctx.beginPath();ctx.moveTo(bx,by);ctx.quadraticCurveTo(cx,cy,nx,ny);ctx.stroke();
  ctx.setLineDash([]);

  // Wall bracket
  ctx.fillStyle='#2a2a5a';ctx.beginPath();ctx.rect(bx-18,by-12,36,12);ctx.fill();
  ctx.fillStyle='#3a3a7a';ctx.beginPath();ctx.rect(bx-10,by-20,20,10);ctx.fill();

  // Nozzle
  const ang=Math.atan2(ny-cy,nx-cx);
  ctx.save();ctx.translate(nx,ny);ctx.rotate(ang-Math.PI/2);
  ctx.fillStyle=h.col;ctx.beginPath();ctx.rect(-9,-4,18,20);ctx.fill();
  ctx.fillStyle=h.hi;ctx.beginPath();ctx.rect(-6,12,12,8);ctx.fill();
  ctx.restore();

  // Drip at tip
  const tipX=nx+Math.cos(ang)*20,tipY=ny+Math.sin(ang)*20;
  const ds=2.5+Math.sin(Date.now()*.003)*2;
  ctx.beginPath();ctx.arc(tipX,tipY,ds,0,Math.PI*2);
  ctx.fillStyle=l.color+'cc';ctx.fill();
  ctx.restore();
}

function drawPlug(){
  if(!S.plug)return;
  const p=S.plug,l=liq();
  const x=p.x,y=p.y+p.bob;
  ctx.save();
  if(p.draining){
    ctx.translate(x,y+p.prog*50);
    ctx.rotate(p.prog*Math.PI*8);
    ctx.globalAlpha=1-p.prog*.9;
  }else{
    ctx.translate(x,y);
    const pulse=(Math.sin(Date.now()*.005)+1)*.5;
    ctx.beginPath();ctx.arc(0,0,30+pulse*9,0,Math.PI*2);
    ctx.strokeStyle=l.color+Math.round(pulse*0x99).toString(16).padStart(2,'0');
    ctx.lineWidth=2;ctx.stroke();
  }
  // Chain
  ctx.strokeStyle='#aaa';ctx.lineWidth=1.8;ctx.setLineDash([3,4]);
  ctx.beginPath();ctx.moveTo(0,-22);ctx.lineTo(0,-40);ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();ctx.arc(0,-42,5,0,Math.PI*2);ctx.lineWidth=2;ctx.stroke();
  // Disc
  ctx.beginPath();ctx.ellipse(0,0,22,8,0,0,Math.PI*2);
  ctx.fillStyle='#c8a96e';ctx.fill();ctx.strokeStyle='#a07840';ctx.lineWidth=1.5;ctx.stroke();
  // Dome
  ctx.beginPath();ctx.ellipse(0,-5,14,14,0,0,Math.PI*2);
  ctx.fillStyle='#d4b47a';ctx.fill();ctx.strokeStyle='#a07840';ctx.lineWidth=1.5;ctx.stroke();
  // Ridges
  for(let i=-1;i<=1;i++){
    ctx.beginPath();ctx.moveTo(i*5-1,-12);ctx.lineTo(i*5-1,0);
    ctx.strokeStyle='#a0784088';ctx.lineWidth=1;ctx.stroke();
  }
  if(!p.draining){
    ctx.font='bold 10px "Space Mono",monospace';ctx.fillStyle='#fff';
    ctx.textAlign='center';ctx.fillText('PULL',0,30);
  }
  ctx.globalAlpha=1;ctx.restore();
}

// ════════════════════════════════════════════════════════
// HUD
// ════════════════════════════════════════════════════════
function updateHUD(){
  $('h-score').textContent=fmt(S.score);
  $('h-drip').textContent=fmt(S.driplets);
  $('h-puddle').textContent=Math.round((S.puddle.radius/S.puddle.maxRadius)*100)+'%';
  $('h-level').textContent=S.puddleLevel;
}

// ════════════════════════════════════════════════════════
// SHOP
// ════════════════════════════════════════════════════════
let currentTab='upgrades';
function switchTab(t, btn){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('[id^="tab-"]').forEach(d=>d.style.display='none');
  btn.classList.add('active');
  $('tab-'+t).style.display='block';
  if(t==='ach')buildAchTab();
}

function buildShop(){
  buildUpgradesTab();
  buildPipesTab();
  buildLiquidsTab();
}

function buildUpgradesTab(){
  const el=$('tab-upgrades');el.innerHTML='';

  // Prestige — available when you've spent enough THIS run (threshold scales per prestige)
  const pc = S.prestigeCount||0;
  const prestigeThreshold = 1e14 * Math.pow(1000, pc); // 100T first time, 1Qa second, etc.
  if(S.totalSpent >= prestigeThreshold){
    const nextMult = Math.pow(1.5, pc+1);
    const sec=document.createElement('div');sec.className='sec-lbl';sec.textContent='⚡ Prestige';el.appendChild(sec);
    const box=document.createElement('div');
    box.style.cssText='background:#1a0a00;border:1px solid #ff660055;border-radius:8px;padding:10px 12px;margin-bottom:8px;';
    box.innerHTML=`<div style="font-size:12px;font-weight:700;color:#ff8800">🔁 PRESTIGE RESET</div>
      <div style="font-size:10px;color:#9090c0;margin-top:3px">Resets everything including pipe &amp; liquid.<br>Keeps only achievements.</div>
      <div style="font-size:11px;color:var(--gold);margin-top:5px">Reward: <b>×${fmt(nextMult)} permanent income</b></div>
      <div style="font-size:10px;color:var(--muted)">Current bonus: ×${fmt(Math.pow(1.5,pc))} — Prestige ${pc}</div>`;
    const pbtn=document.createElement('button');
    pbtn.style.cssText='margin-top:8px;width:100%;background:#ff440022;border:1px solid #ff4400aa;border-radius:6px;padding:8px;color:#ff6600;font-family:"Space Mono",monospace;font-size:11px;font-weight:700;cursor:pointer;';
    pbtn.textContent='⚡ PRESTIGE NOW';
    pbtn.addEventListener('click',doPrestige);
    box.appendChild(pbtn);el.appendChild(box);
  }

  const tiers={1:'Tier 1 — Core',2:'Tier 2 — Mid',3:'Tier 3 — Late',4:'Tier 4 — End Game',5:'Tier 5 — Beyond',6:'Tier 6 — ∞ Infinite'};
  let lastTier=0;
  for(const def of UPGRADES){
    if(!visible(def.revealAt))continue;
    if(def.tier!==lastTier){
      const lbl=document.createElement('div');lbl.className='sec-lbl';lbl.textContent=tiers[def.tier]||'Beyond';el.appendChild(lbl);
      lastTier=def.tier;
    }
    const lvl=upg(def.id);
    const cost=upgCost(def,lvl);
    const can=S.driplets>=cost;
    const btn=document.createElement('button');
    btn.className='upg'+(can?' can':'');
    btn.innerHTML=`<div class="upg-top"><span class="upg-name">${def.icon} ${def.name}</span><span class="upg-lvl" style="color:var(--accent)">Lv.${lvl}</span></div>
      <div class="upg-desc">${def.desc}</div>
      <div class="upg-cost">💧 ${fmt(cost)}</div>`;
    btn.addEventListener('click',()=>{
      const c=upgCost(def,upg(def.id));
      if(S.driplets>=c){S.driplets-=c;S.totalSpent+=c;S.upgrades[def.id]=(S.upgrades[def.id]||0)+1;updateHUD();buildShop();checkMilestones();}
    });
    el.appendChild(btn);
  }
}

function buildPipesTab(){
  const el=$('tab-pipes');el.innerHTML='';
  const lbl=document.createElement('div');lbl.className='sec-lbl';lbl.textContent='Pipes & Hoses';el.appendChild(lbl);
  for(const h of HOSES){
    if(!visible(h.revealAt))continue;
    const unl=S.hoses[h.id],active=S.currentHose===h.id;
    const btn=document.createElement('button');
    btn.className='tile'+(active?' active':'')+(!unl?' locked':'');
    btn.style.borderColor=active?h.hi+'99':'';
    btn.innerHTML=`<div class="tile-left"><div class="tile-dot" style="background:${h.col}"></div>
      <div><div class="tile-name">${h.icon} ${h.name}</div><div style="font-size:10px;color:#7070a0;margin-top:2px">${h.desc}</div></div></div>
      <div class="tile-right">${unl?`×${h.flow} flow`:'💧 '+fmt(h.cost)}<br><span class="sub">${unl?'✓ owned':S.driplets>=h.cost?'tap to buy':'locked'}</span></div>`;
    btn.addEventListener('click',()=>{
      if(!unl){if(S.driplets>=h.cost){S.driplets-=h.cost;S.totalSpent+=h.cost;S.hoses[h.id]=true;S.currentHose=h.id;updateHUD();buildShop();checkMilestones();}}
      else{S.currentHose=h.id;buildShop();}
    });
    el.appendChild(btn);
  }
}

function buildLiquidsTab(){
  const el=$('tab-liquids');el.innerHTML='';
  const lbl=document.createElement('div');lbl.className='sec-lbl';lbl.textContent='Liquids';el.appendChild(lbl);
  for(const [id,l] of Object.entries(LIQUIDS)){
    if(!visible(l.revealAt))continue;
    const unl=S.liquids[id],active=S.currentLiquid===id;
    const btn=document.createElement('button');
    btn.className='tile'+(active?' active':'')+(!unl?' locked':'');
    btn.innerHTML=`<div class="tile-left"><div class="tile-dot" style="background:${l.color}"></div>
      <div><div class="tile-name">${l.emoji} ${l.name}</div><div style="font-size:10px;color:#7070a0;margin-top:2px">${l.desc}</div></div></div>
      <div class="tile-right">${unl?'active':'💧 '+fmt(l.cost)}<br><span class="sub">${unl?'✓ owned':S.driplets>=l.cost?'tap to buy':'locked'}</span></div>`;
    btn.addEventListener('click',()=>{
      if(!unl){if(S.driplets>=l.cost){S.driplets-=l.cost;S.totalSpent+=l.cost;S.liquids[id]=true;S.currentLiquid=id;updateHUD();buildShop();checkMilestones();}}
      else{S.currentLiquid=id;buildShop();}
    });
    el.appendChild(btn);
  }
}

function doPrestige(){
  if(!confirm('Prestige reset? You will lose driplets, upgrades, current liquid & pipe. You keep achievements and gain a permanent income bonus.')) return;
  S.prestigeCount = (S.prestigeCount||0) + 1;
  S.prestigedThisRun = false; // must re-earn the threshold next run
  // Reset progress fully — including hose and liquid
  S.driplets = 0;
  S.score = 0;
  S.totalSpent = 0;
  S.puddleLevel = 1;
  S.puddle.radius = 25;
  S.puddle.maxRadius = 200;
  S.combo = 0; S.comboTimer = 0;
  S.plug = null;
  S.currentLiquid = 'water';
  S.currentHose = 'garden';
  // Reset all liquid/hose unlocks except water/garden
  Object.keys(S.liquids).forEach(k => S.liquids[k] = k==='water');
  HOSES.forEach(h => S.hoses[h.id] = h.id==='garden');
  UPGRADES.forEach(u => S.upgrades[u.id] = 0);
  updateHUD(); buildShop(); checkMilestones();
  floatTxt(canvas.width/2, canvas.height/2 - 40, `⚡ PRESTIGE ${S.prestigeCount}!`, '#ff8800');
  saveGame();
}



function buildAchTab(){
  const el=$('tab-ach');el.innerHTML='';
  const got=ACHIEVEMENTS.filter(a=>S.achievements[a.id]);
  const lbl=document.createElement('div');lbl.className='ach-count';
  lbl.textContent=`${got.length} / ${ACHIEVEMENTS.length} unlocked`;el.appendChild(lbl);
  for(const a of ACHIEVEMENTS){
    const has=!!S.achievements[a.id];
    const div=document.createElement('div');
    div.className='ach'+(has?' got':'');
    div.innerHTML=`<div class="ach-name">${has?'🏆':''} ${a.name}</div><div class="ach-desc">${a.desc}</div>`;
    el.appendChild(div);
  }
}

// ════════════════════════════════════════════════════════
// ACHIEVEMENTS
// ════════════════════════════════════════════════════════
function checkMilestones(){
  for(const a of ACHIEVEMENTS){
    if(!S.achievements[a.id]&&a.check(S)){
      S.achievements[a.id]=true;
      showToast(a);
      if(currentTab==='ach')buildAchTab();
      saveGame();
    }
  }
}

function showToast(a){
  const wrap=$('toast-area');
  const t=document.createElement('div');t.className='toast';
  t.innerHTML=`<div class="toast-tag">Achievement Unlocked</div>
    <div class="toast-name">🏆 ${a.name}</div>
    <div class="toast-desc">${a.desc}</div>`;
  wrap.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .6s';},3000);
  setTimeout(()=>t.remove(),3700);
}

// ════════════════════════════════════════════════════════
// INPUT
// ════════════════════════════════════════════════════════
const cur=$('cur');

// Convert raw clientX/clientY → canvas pixel coords, accounting for zoom/scale
function toCanvas(cx,cy){
  const r=canvas.getBoundingClientRect();
  const scaleX=canvas.width/r.width;
  const scaleY=canvas.height/r.height;
  return {x:(cx-r.left)*scaleX, y:(cy-r.top)*scaleY};
}

function handleMove(cx,cy){
  const p=toCanvas(cx,cy);
  S.mouseX=clamp(p.x,0,canvas.width);
  // cursor follows raw screen position
  if(cy!==undefined)cur.style.top=cy+'px';
  if(cx<canvas.getBoundingClientRect().right){cur.style.left=cx+'px';cur.style.display='block';}
  else cur.style.display='none';
}
function handleClick(cx,cy){
  if(!S.plug||S.plug.draining)return;
  const p=toCanvas(cx,cy);
  const px=S.plug.x,py=S.plug.y+S.plug.bob;
  if(Math.sqrt((p.x-px)**2+(p.y-py)**2)<36){S.plug.draining=true;S.mouseHeld=false;}
}
function onCanvas(cx,cy){
  const r=canvas.getBoundingClientRect();
  return cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom;
}
window.addEventListener('mousemove',e=>handleMove(e.clientX,e.clientY));
window.addEventListener('mousedown',e=>{
  handleClick(e.clientX,e.clientY);
  const r=canvas.getBoundingClientRect();
  if(e.clientX<r.right){S.mouseHeld=true;handleMove(e.clientX,e.clientY);}
});
window.addEventListener('mouseup',()=>{S.mouseHeld=false;});
window.addEventListener('mouseleave',()=>{S.mouseHeld=false;});

// Touch on canvas only — panel handles its own scroll natively
canvas.addEventListener('touchstart',e=>{
  handleClick(e.touches[0].clientX,e.touches[0].clientY);
  S.mouseHeld=true;
  handleMove(e.touches[0].clientX,e.touches[0].clientY);
},{passive:true});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  handleMove(e.touches[0].clientX,e.touches[0].clientY);
},{passive:false});
canvas.addEventListener('touchend',()=>{S.mouseHeld=false;});
window.addEventListener('touchend',()=>{S.mouseHeld=false;});

// ── Phone shake → fling the hose ─────────────────────────────
(()=>{
  let lastAx=0, lastAy=0, lastAz=0;
  let permissionAsked=false;

  function handleMotion(e){
    const a=e.accelerationIncludingGravity||e.acceleration;
    if(!a)return;
    const ax=a.x||0, ay=a.y||0, az=a.z||0;
    const dx=ax-lastAx, dy=ay-lastAy, dz=az-lastAz;
    lastAx=ax; lastAy=ay; lastAz=az;

    // Total jolt magnitude
    const jolt=Math.sqrt(dx*dx+dy*dy+dz*dz);
    if(jolt<4)return; // ignore tiny bumps

    // Map lateral acceleration (x-axis on phone) to hose bend velocity
    const force = clamp(dx * 1.8, -40, 40) * (1 + upg('wiggle')*.3);
    S.hoseBendVel += force;
    S.mouseHeld = true; // open the tap while shaking

    // Screen shake proportional to jolt
    S.shake = Math.min(S.shake + jolt * .4, 10);

    // Auto-stop tap after 300ms of no motion
    clearTimeout(S._shakeTimeout);
    S._shakeTimeout = setTimeout(()=>{ S.mouseHeld = false; }, 300);
  }

  // iOS 13+ requires explicit permission
  function requestMotion(){
    if(permissionAsked)return;
    permissionAsked=true;
    if(typeof DeviceMotionEvent!=='undefined' &&
       typeof DeviceMotionEvent.requestPermission==='function'){
      DeviceMotionEvent.requestPermission()
        .then(r=>{ if(r==='granted') window.addEventListener('devicemotion',handleMotion); })
        .catch(()=>{});
    } else {
      window.addEventListener('devicemotion',handleMotion);
    }
  }

  // Request on first touch (needs user gesture on iOS)
  document.addEventListener('touchstart', requestMotion, {once:true, passive:true});
})();

// ════════════════════════════════════════════════════════
// INIT & LOOP
// ════════════════════════════════════════════════════════
loadGame();
S.hoseBaseX=canvas.width/2;
S.hoseBaseY=-10;
S.nozzleX=canvas.width/2;
S.nozzleY=S.hoseBaseY+S.hoseLen;
S.mouseX=canvas.width/2;
S.puddle.x=canvas.width/2;
S.puddle.y=groundY();

buildShop();updateHUD();checkMilestones();

function loop(ts){update(ts);draw();requestAnimationFrame(loop);}
requestAnimationFrame(loop);
</script>
